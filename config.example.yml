# SCPSL-MicroServer-Tweaks example configuration

enable_scp_freeze: true
default_scp_freeze_seconds: 60
use_player_count_overrides: true

scp_freeze_seconds_by_player_count:
  5: 75
  6: 60
  7: 45
  8: 40

freeze_capture_delay_seconds: 0.5
position_tolerance: 0.03

show_countdown_hint: true
countdown_hint_interval_seconds: 1
countdown_hint_text: |-
  <size=32><color=#ff5555>收容程序仍在運作</color>
  <color=white>解除收容：{seconds} 秒</color></size>
release_hint_text: |-
  <size=32><color=#ff5555>收容失效</color>
  <color=white>你現在可以移動。</color></size>
release_hint_duration_seconds: 4

enable_starting_tokens: true

# Set = directly set the starting amount.
# Add = add this amount on top of vanilla.
starting_token_mode: Set

# -1 = do not change that faction.
ntf_starting_tokens: 2
chaos_starting_tokens: 2
maximum_token_value: 20

enable_debug_logging: false

# Role Voting
# Players type .1 .2 .3 .4 or .vote scp/sci/d/guard in the game console during lobby.
enable_role_voting: true
voting_time_seconds: 45
vote_hint_interval_seconds: 1

# Random Events
# Timed random events trigger every 3-5 minutes during a round.
# All events use CASSIE for voice announcements.
enable_random_events: true
random_event_min_interval_seconds: 180
random_event_max_interval_seconds: 300
random_event_min_players: 1

# Elevator Malfunction: all elevators locked for this many seconds.
random_event_elevator_lock_duration: 60

# Stealth: humans become invisible and silent for this many seconds.
random_event_stealth_duration: 30

# Blackout: all facility lights off for this many seconds (180 = 3 minutes).
random_event_blackout_duration: 180

# Nuke Alert: CASSIE triggers a warhead alarm with this countdown.
# 50% chance it's a false alarm (auto-cancelled), 50% chance it detonates.
# Cannot trigger until this many minutes have passed since round start.
random_event_nuke_min_minutes: 10
random_event_nuke_countdown_seconds: 60
random_event_nuke_false_alarm_chance: 0.5
